<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ideate · the convergence reveal</title>
<link rel="stylesheet" href="assets/colors_and_type.css" />
<style>
  /* ---- shared concept frame ---- */
  .cc { height: 100%; display: flex; flex-direction: column; background: var(--paper); color: var(--ink); font-family: var(--font-sans); }
  .cc-pad { padding: 26px 26px 0; flex: 1; display: flex; flex-direction: column; }
  .cc-eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ash); }
  .cc-title { font-size: 29px; font-weight: var(--fw-black); letter-spacing: -0.03em; line-height: 1; margin-top: 12px; }
  .cc-title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; letter-spacing: -0.005em; }
  .cc-body { margin-top: 24px; flex: 1; }
  .cc-cap { border-top: 1px solid var(--ink); font-family: var(--font-mono); font-size: 10px; line-height: 1.55; letter-spacing: 0.03em; color: var(--ash); padding: 13px 26px 16px; text-transform: uppercase; }
  .cc-cap b { color: var(--ink); font-weight: var(--fw-medium); }

  /* ---- A · Roll Call ---- */
  .rc-row { display: grid; grid-template-columns: 22px 1fr 18px; gap: 13px; align-items: center; padding: 8px 0; border-top: 1px solid var(--fog); }
  .rc-row:first-child { border-top: 1px solid var(--ink); }
  .rc-num { font-family: var(--font-mono); font-size: 10.5px; color: var(--ash); }
  .rc-axis { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); }
  .rc-find { font-size: 13px; line-height: 1.25; color: var(--ink); margin-top: 3px; }
  .rc-tick { font-size: 12px; color: var(--fog); text-align: right; }
  .rc-resolve { display: flex; align-items: baseline; gap: 12px; margin-top: 16px; border-top: 2px solid var(--ink); padding-top: 14px; }
  .rc-resolve .lab { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); }
  .rc-resolve .val { font-size: 22px; font-weight: var(--fw-black); letter-spacing: -0.025em; color: var(--signal); }
  .rc-foot { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ash); margin-top: 8px; }

  /* ---- B · Sealed Verdicts ---- */
  .sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .sv-card { border: 1px solid var(--ink); padding: 11px 12px; min-height: 78px; display: flex; flex-direction: column; justify-content: flex-start; }
  .sv-card.sealed { background: var(--bone); align-items: center; justify-content: center; text-align: center; }
  .sv-seal { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ash); line-height: 1.7; }
  .sv-axis { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); }
  .sv-axis.sig { color: var(--signal); }
  .sv-find { font-size: 12px; line-height: 1.28; color: var(--ink); margin-top: 6px; font-weight: var(--fw-medium); }
  .sv-card.resolve { background: var(--ink); border-color: var(--ink); justify-content: space-between; }
  .sv-card.resolve .sv-axis.sig { color: var(--paper); opacity: 0.7; }
  .sv-val { font-size: 19px; font-weight: var(--fw-black); letter-spacing: -0.02em; color: var(--signal); margin-top: 8px; }

  /* ---- C · Triangulation ---- */
  .tri { display: block; margin-top: 6px; }
  .tri-lab { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; fill: var(--ash); }
  .tri-fix { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; fill: var(--signal); }

  /* ---- D · Column Collapse ---- */
  .cl-line { display: grid; grid-template-columns: 96px 1fr; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--fog); opacity: 0.62; }
  .cl-line .ax { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ash); align-self: center; }
  .cl-line .fd { font-size: 11.5px; color: var(--ash); line-height: 1.2; }
  .cl-bracket { text-align: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ash); padding: 16px 0; }
  .cl-final { font-size: 27px; font-weight: var(--fw-black); letter-spacing: -0.03em; line-height: 1.04; }
  .cl-final .q { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--signal); }

  /* ---- E · Density Map ---- */
  .dn { display: grid; grid-template-columns: 78px repeat(3, 1fr); border-left: 1px solid var(--ink); border-top: 1px solid var(--ink); }
  .dn > div { border-right: 1px solid var(--fog); border-bottom: 1px solid var(--fog); }
  .dn-h { padding: 7px 8px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ash); min-height: 28px; }
  .dn-h.sig { color: var(--signal); }
  .dn-rl { padding: 7px 8px; font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ash); }
  .dn-cell { background: var(--paper); }
  .dn-cell.on { background: var(--ink); }
  .dn-tl { padding: 7px 8px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
  .dn-t { padding: 7px 8px; font-size: 15px; font-weight: var(--fw-black); color: var(--ink); }
  .dn-t.sig { color: var(--signal); }
  .dn-foot { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ash); margin-top: 14px; }
  .dn-foot b { font-style: normal; color: var(--ink); font-weight: var(--fw-medium); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="reveal-concepts.jsx"></script>
</body>
</html>
